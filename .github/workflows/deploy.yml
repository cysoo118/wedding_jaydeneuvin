name: Deploy to GitHub Pages

on:
  # Rebuild and deploy on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the deploy job needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only ever run one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # base-href must match the repo name so assets resolve under
      # https://<user>.github.io/<repo>/  — derived automatically here.
      - name: Build
        run: npm run build -- --base-href="/${{ github.event.repository.name }}/"

      # GitHub Pages runs Jekyll by default, which strips files/folders
      # starting with "_". .nojekyll disables that. 404.html gives a
      # single-page fallback for deep links / refreshes.
      - name: Prepare Pages artifact
        run: |
          out=dist/heritage-invite/browser
          touch "$out/.nojekyll"
          cp "$out/index.html" "$out/404.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/heritage-invite/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
